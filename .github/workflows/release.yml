name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from SystemActivity.php
        id: version
        run: |
          set -euo pipefail

          version_line=$(sed -n '2p' SystemActivity.php)
          version=$(echo "$version_line" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)

          if [ -z "$version" ]; then
            echo "Could not parse version from SystemActivity.php line 2: '$version_line'" >&2
            exit 1
          fi

          echo "Detected version: $version"
          echo "tag_name=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag_check
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag ${TAG_NAME} already exists; skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG_NAME} does not exist; will create release."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Build release archive
        if: steps.tag_check.outputs.exists == 'false'
        id: package
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail

          archive_root="pedant"
          asset_name="pedant-${TAG_NAME}.zip"

          git archive \
            --format=zip \
            --output="$asset_name" \
            --prefix="${archive_root}/" \
            "$GITHUB_SHA" \
            -- \
            . \
            ':(exclude).github' \
            ':(exclude).gitignore' \
            ':(exclude)README.md' \
            ':(exclude)README.MD' \
            ':(exclude)readme.md'

          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.package.outputs.asset_name }}
