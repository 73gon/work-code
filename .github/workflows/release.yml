name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release archive
        id: package
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          archive_root="pedant"
          asset_name="pedant-${TAG_NAME}.zip"

          git archive \
            --format=zip \
            --output="$asset_name" \
            --prefix="${archive_root}/" \
            "$GITHUB_SHA" \
            -- \
            . \
            ':(exclude).github' \
            ':(exclude).gitignore' \
            ':(exclude)README.md' \
            ':(exclude)README.MD' \
            ':(exclude)readme.md'

          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.package.outputs.asset_name }}
